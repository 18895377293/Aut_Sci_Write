<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="120" height="120" rx="10" ry="10" fill="#0A1628"/>

  <!-- Border -->
  <rect x="2" y="2" width="116" height="116" rx="8" ry="8" fill="none" stroke="#E8B339" stroke-width="1" opacity="0.5"/>

  <!-- Corner decorations -->
  <rect x="4" y="4" width="4" height="4" fill="#E8B339" opacity="0.9"/>
  <rect x="112" y="4" width="4" height="4" fill="#E8B339" opacity="0.9"/>
  <rect x="4" y="112" width="4" height="4" fill="#E8B339" opacity="0.9"/>
  <rect x="112" y="112" width="4" height="4" fill="#E8B339" opacity="0.9"/>
  <rect x="9" y="4" width="6" height="2" fill="#E8B339" opacity="0.5"/>
  <rect x="4" y="9" width="2" height="6" fill="#E8B339" opacity="0.5"/>
  <rect x="105" y="4" width="6" height="2" fill="#E8B339" opacity="0.5"/>
  <rect x="114" y="9" width="2" height="6" fill="#E8B339" opacity="0.5"/>
  <rect x="9" y="114" width="6" height="2" fill="#E8B339" opacity="0.5"/>
  <rect x="4" y="105" width="2" height="6" fill="#E8B339" opacity="0.5"/>
  <rect x="105" y="114" width="6" height="2" fill="#E8B339" opacity="0.5"/>
  <rect x="114" y="105" width="2" height="6" fill="#E8B339" opacity="0.5"/>

  <!-- ===== UPPER HALF: 明 (日 left + 月 right), y: 10-56 ===== -->
  <g filter="url(#glow)">

    <!-- 日 (x: 10-46, y: 10-56) -->
    <!-- top bar -->
    <rect x="10" y="10" width="36" height="4" fill="#E8B339"/>
    <!-- left stroke -->
    <rect x="10" y="14" width="4" height="42" fill="#E8B339"/>
    <!-- right stroke -->
    <rect x="42" y="14" width="4" height="42" fill="#E8B339"/>
    <!-- middle bar -->
    <rect x="10" y="30" width="36" height="4" fill="#E8B339"/>
    <!-- bottom bar -->
    <rect x="10" y="52" width="36" height="4" fill="#E8B339"/>

    <!-- 月 (x: 50-108, y: 10-56) -->
    <!-- left stroke -->
    <rect x="50" y="10" width="4" height="46" fill="#C49520"/>
    <!-- top bar -->
    <rect x="54" y="10" width="36" height="4" fill="#C49520"/>
    <!-- right arc: stepped pixels simulating curve -->
    <rect x="90" y="14" width="4" height="4" fill="#C49520"/>
    <rect x="94" y="18" width="4" height="4" fill="#C49520"/>
    <rect x="98" y="22" width="4" height="12" fill="#C49520"/>
    <rect x="94" y="34" width="4" height="4" fill="#C49520"/>
    <rect x="90" y="38" width="4" height="4" fill="#C49520"/>
    <rect x="86" y="42" width="4" height="4" fill="#C49520"/>
    <rect x="82" y="46" width="4" height="4" fill="#C49520"/>
    <rect x="78" y="50" width="4" height="4" fill="#C49520"/>
    <!-- inner bar 1 -->
    <rect x="54" y="26" width="36" height="4" fill="#C49520"/>
    <!-- inner bar 2 -->
    <rect x="54" y="42" width="28" height="4" fill="#C49520"/>
    <!-- bottom bar -->
    <rect x="50" y="52" width="32" height="4" fill="#C49520"/>

  </g>

  <!-- ===== LOWER HALF: 空 (穴 left + 工 right), y: 62-106 ===== -->
  <g filter="url(#glow)">

    <!-- 穴 (x: 10-54, y: 62-106) -->
    <!-- 宝盖头: center top dot -->
    <rect x="28" y="62" width="4" height="4" fill="#E8B339"/>
    <!-- 宝盖头: left slope (stepped) -->
    <rect x="24" y="66" width="4" height="4" fill="#E8B339"/>
    <rect x="20" y="70" width="4" height="4" fill="#E8B339"/>
    <rect x="16" y="74" width="4" height="4" fill="#E8B339"/>
    <rect x="12" y="74" width="4" height="4" fill="#E8B339"/>
    <!-- 宝盖头: right slope (stepped) -->
    <rect x="32" y="66" width="4" height="4" fill="#E8B339"/>
    <rect x="36" y="70" width="4" height="4" fill="#E8B339"/>
    <rect x="40" y="74" width="4" height="4" fill="#E8B339"/>
    <rect x="44" y="74" width="4" height="4" fill="#E8B339"/>
    <!-- 宝盖头: horizontal bar -->
    <rect x="10" y="78" width="44" height="4" fill="#E8B339"/>
    <!-- two dots -->
    <rect x="16" y="82" width="4" height="8" fill="#C49520"/>
    <rect x="40" y="82" width="4" height="8" fill="#C49520"/>
    <!-- 口 box -->
    <rect x="20" y="90" width="24" height="4" fill="#E8B339"/>
    <rect x="20" y="94" width="4" height="8" fill="#E8B339"/>
    <rect x="40" y="94" width="4" height="8" fill="#E8B339"/>
    <rect x="20" y="102" width="24" height="4" fill="#E8B339"/>

    <!-- 工 (x: 58-108, y: 62-106) -->
    <!-- top bar -->
    <rect x="58" y="66" width="50" height="4" fill="#C49520"/>
    <!-- vertical stroke (center) -->
    <rect x="80" y="70" width="4" height="28" fill="#C49520"/>
    <!-- bottom bar -->
    <rect x="58" y="98" width="50" height="4" fill="#C49520"/>

  </g>

  <!-- Bottom label -->
  <text x="60" y="115" font-family="'Courier New', monospace" font-size="6" fill="#E8B339" opacity="0.65" text-anchor="middle" letter-spacing="1.5">SHUO · ZHAO</text>
</svg>
